# ProduÇðo - PostgreSQL externo
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${JDBC_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# classpath:db/migration cobre SQL em src/main/resources/db/migration
# e Java migrations no package db.migration (src/main/java/db/migration)
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.clean-disabled=true

spring.sql.init.mode=never
management.endpoints.web.discovery.enabled=false

# Chaves JWT de produção devem vir de arquivo externo ou variável de ambiente.
jwt.public.key=${JWT_PUBLIC_KEY:file:${user.home}/.caprigestor/keys/app.pub}
jwt.private.key=${JWT_PRIVATE_KEY:file:${user.home}/.caprigestor/keys/app.key}

# Em produção, o bootstrap do admin não deve criar nem resetar senha automaticamente.
caprigestor.bootstrap.admin.enabled=${CAPRIGESTOR_BOOTSTRAP_ADMIN_ENABLED:false}
caprigestor.bootstrap.admin.reset-password=${CAPRIGESTOR_BOOTSTRAP_ADMIN_RESET_PASSWORD:false}

# Mensageria opcional em producao. Ative apenas se o ambiente realmente usar RabbitMQ.
caprigestor.messaging.enabled=${CAPRIGESTOR_MESSAGING_ENABLED:false}
management.health.rabbit.enabled=${caprigestor.messaging.enabled:false}
