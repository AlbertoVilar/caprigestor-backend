# application.properties (default)

# Define o perfil 'dev' como padrao se nenhum outro for especificado
spring.profiles.active=dev

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false
# Harden error responses to avoid leaking sensitive request data
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ===============================
# Operational health check
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ===============================
# RabbitMQ (spring)
# ===============================
caprigestor.messaging.enabled=${CAPRIGESTOR_MESSAGING_ENABLED:true}
management.health.rabbit.enabled=${caprigestor.messaging.enabled:true}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}

# ===============================
# CapriGestor - Messaging defaults
# ===============================
caprigestor.rabbitmq.exchange=events-exchange
caprigestor.rabbitmq.queue=events-queue
caprigestor.rabbitmq.routing-key=event.created

# ===============================
# Security & JWT
# ===============================
jwt.public.key=classpath:app.pub
jwt.private.key=classpath:app.key

# ===============================
# Mail / password reset
# ===============================
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_TIMEOUT_MS:5000}

caprigestor.auth.password-reset.frontend-base-url=${PASSWORD_RESET_FRONTEND_BASE_URL:http://localhost:5173}
caprigestor.auth.password-reset.from-address=${PASSWORD_RESET_FROM_ADDRESS:no-reply@caprigestor.local}
caprigestor.auth.password-reset.ttl-minutes=${PASSWORD_RESET_TTL_MINUTES:30}
caprigestor.auth.password-reset.cooldown-seconds=${PASSWORD_RESET_COOLDOWN_SECONDS:60}
